apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-api
  labels:
    app: fte-api
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fte-api
  template:
    metadata:
      labels:
        app: fte-api
        component: api
    spec:
      containers:
        - name: fte-api
          image: digital-fte-api:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: POSTGRES_SERVER
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: KAFKA_BROKER_URL
              value: "kafka:9092"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-worker
  labels:
    app: fte-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fte-worker
  template:
    metadata:
      labels:
        app: fte-worker
        component: worker
    spec:
      containers:
        - name: fte-worker
          image: digital-fte-worker:latest
          env:
            - name: KAFKA_BROKER_URL
              value: "kafka:9092"
            - name: KAFKA_TOPIC
              value: "support.tickets.new"
            - name: KAFKA_GROUP_ID
              value: "fte-ai-worker-group"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"