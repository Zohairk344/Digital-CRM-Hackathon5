version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fte_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    container_name: fte_kafka
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  console:
    image: docker.redpanda.com/redpandadata/console:v2.3.1
    container_name: fte_kafka_console
    # The '|' symbol allows multi-line strings and ignores colons/quotes
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "kafka:
          brokers: [ 'redpanda:29092' ]" > /tmp/config.yml;
        /app/console
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

volumes:
  postgres_data:
  redpanda_data: